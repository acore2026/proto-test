name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Build CI binary
        run: |
          mkdir -p dist
          go build -o dist/mock5g ./cmd/mock5g

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mock5g-ci-linux-amd64
          path: dist/mock5g
          if-no-files-found: error
